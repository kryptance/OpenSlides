# Service aliases for internal service discovery
# The proxy expects short service names like "client", "auth", etc.
# but Helm creates services with fullname prefix like "openslides-client"
# Using FQDN format for ExternalName to ensure proper DNS resolution

apiVersion: v1
kind: Service
metadata:
  name: client
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ include "openslides.fullname" . }}-client.{{ .Release.Namespace }}.svc.cluster.local
---
