{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openslides.fullname" . }}
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.oidc.enabled }}
    # Add OIDC plugin middleware
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "openslides.fullname" . }}-oidc@kubernetescrd
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.global.domain }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "openslides.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          # All traffic goes through the proxy
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openslides.fullname" . }}-proxy
                port:
                  number: {{ .Values.proxy.service.port }}
{{- end }}
