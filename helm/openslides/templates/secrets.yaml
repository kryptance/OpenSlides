apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openslides.secretsName" . }}
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
type: Opaque
data:
  # Auth token key for JWT signing
  auth-token-key: {{ .Values.secrets.authTokenKey | default (randAlphaNum 32) | b64enc | quote }}
  # Auth cookie key for cookie signing
  auth-cookie-key: {{ .Values.secrets.authCookieKey | default (randAlphaNum 32) | b64enc | quote }}
  # Superadmin password
  superadmin-password: {{ .Values.secrets.superadminPassword | default (randAlphaNum 16) | b64enc | quote }}
  # Internal auth password
  internal-auth-password: {{ .Values.secrets.internalAuthPassword | default (randAlphaNum 32) | b64enc | quote }}
  # Manage auth password
  manage-auth-password: {{ .Values.secrets.manageAuthPassword | default (randAlphaNum 32) | b64enc | quote }}
---
{{- if not .Values.postgresql.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openslides.fullname" . }}-postgresql
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | default (randAlphaNum 16) | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | default (randAlphaNum 16) | b64enc | quote }}
{{- end }}
