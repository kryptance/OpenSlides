{{- if .Values.manage.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openslides.fullname" . }}-manage
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: manage
spec:
  type: {{ .Values.manage.service.type }}
  ports:
    - port: {{ .Values.manage.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openslides.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: manage
{{- end }}
