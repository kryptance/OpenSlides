{{- if .Values.autoupdate.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openslides.fullname" . }}-autoupdate
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: autoupdate
spec:
  type: {{ .Values.autoupdate.service.type }}
  ports:
    - port: {{ .Values.autoupdate.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openslides.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: autoupdate
{{- end }}
