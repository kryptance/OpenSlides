{{- if .Values.autoupdate.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openslides.fullname" . }}-autoupdate
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: autoupdate
spec:
  replicas: {{ .Values.autoupdate.replicaCount }}
  selector:
    matchLabels:
      {{- include "openslides.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: autoupdate
  template:
    metadata:
      labels:
        {{- include "openslides.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: autoupdate
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: autoupdate
          image: {{ include "openslides.image" (dict "global" .Values.global "image" .Values.autoupdate.image) }}
          imagePullPolicy: {{ .Values.autoupdate.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.autoupdate.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "openslides.configmapName" . }}
          env:
            - name: AUTOUPDATE_HOST
              value: "0.0.0.0"
            - name: AUTOUPDATE_PORT
              value: {{ .Values.autoupdate.service.port | quote }}
            - name: AUTH_TOKEN_KEY_FILE
              value: "/run/secrets/auth_token_key"
            - name: AUTH_COOKIE_KEY_FILE
              value: "/run/secrets/auth_cookie_key"
            - name: DATABASE_PASSWORD_FILE
              value: "/run/secrets/postgres_password"
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /system/autoupdate/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /system/autoupdate/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.autoupdate.resources | nindent 12 }}
      volumes:
        - name: secrets
          projected:
            sources:
              - secret:
                  name: {{ include "openslides.secretsName" . }}
                  items:
                    - key: auth-token-key
                      path: auth_token_key
                    - key: auth-cookie-key
                      path: auth_cookie_key
              - secret:
                  name: {{ include "openslides.fullname" . }}-postgresql
                  items:
                    - key: password
                      path: postgres_password
{{- end }}
