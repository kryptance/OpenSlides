{{- if .Values.datastore.reader.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openslides.fullname" . }}-datastore-reader
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-reader
spec:
  type: {{ .Values.datastore.reader.service.type }}
  ports:
    - port: {{ .Values.datastore.reader.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openslides.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-reader
{{- end }}
---
{{- if .Values.datastore.writer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openslides.fullname" . }}-datastore-writer
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-writer
spec:
  type: {{ .Values.datastore.writer.service.type }}
  ports:
    - port: {{ .Values.datastore.writer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openslides.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: datastore-writer
{{- end }}
