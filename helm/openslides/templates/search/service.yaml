{{- if .Values.search.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openslides.fullname" . }}-search
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  type: {{ .Values.search.service.type }}
  ports:
    - port: {{ .Values.search.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openslides.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: search
{{- end }}
