{{- if .Values.search.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openslides.fullname" . }}-search
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: search
spec:
  replicas: {{ .Values.search.replicaCount }}
  selector:
    matchLabels:
      {{- include "openslides.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: search
  template:
    metadata:
      labels:
        {{- include "openslides.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: search
    spec:
      automountServiceAccountToken: false
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: search
          image: {{ include "openslides.image" (dict "global" .Values.global "image" .Values.search.image) }}
          imagePullPolicy: {{ .Values.search.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.search.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "openslides.configmapName" . }}
          env:
            - name: SEARCH_HOST
              value: "0.0.0.0"
            - name: SEARCH_PORT
              value: {{ .Values.search.service.port | quote }}
            - name: DATABASE_HOST
              value: {{ include "openslides.postgresql.host" . | quote }}
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: DATABASE_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DATABASE_PASSWORD_FILE
              value: "/run/secrets/db/postgres_password"
            - name: AUTH_TOKEN_KEY_FILE
              value: "/run/secrets/auth_token_key"
            - name: AUTH_COOKIE_KEY_FILE
              value: "/run/secrets/auth_cookie_key"
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: db-secrets
              mountPath: /run/secrets/db
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.search.resources | nindent 12 }}
      volumes:
        - name: secrets
          secret:
            secretName: {{ include "openslides.secretsName" . }}
            items:
              - key: auth-token-key
                path: auth_token_key
              - key: auth-cookie-key
                path: auth_cookie_key
        - name: db-secrets
          secret:
            secretName: {{ include "openslides.fullname" . }}-postgresql
            items:
              - key: password
                path: postgres_password
{{- end }}
