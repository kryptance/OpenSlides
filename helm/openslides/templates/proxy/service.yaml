{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openslides.fullname" . }}-proxy
  labels:
    {{- include "openslides.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  type: {{ .Values.proxy.service.type }}
  ports:
    - port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openslides.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
{{- end }}
